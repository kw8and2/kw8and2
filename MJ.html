<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mounjaro</title>

<link rel="icon" href="https://domain.glass/favicon/www.lilly.com.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
  --font-main: 'Cairo', sans-serif;
  --font-size-base: 16px;
  --main-img-width: 50rem;
  --main-img-height: 15rem;
  --main-img-top: 5px;
  --dose-img-width: 2rem;
  --dose-img-height: 1rem;
  --dose-img-gap: 27px;
  --result-font-size: 20px;
  --result-margin-top: 10px;
}

body {
  font-family: var(--font-main);
  font-size: var(--font-size-base);
  background: #fff;
}

.pen-image-Middle {
  width: var(--main-img-width);
  height: var(--main-img-height);
  object-fit: contain;
  margin-top: var(--main-img-top);
  transition: all .3s ease;
}

#dose-group-1,
#dose-group-2 {
  gap: var(--dose-img-gap) !important;
}

.dose-img {
  width: var(--dose-img-width);
  height: var(--dose-img-height);
  object-fit: contain;
  transition: transform .3s ease;
  cursor: pointer;
}

.dose-img.active {
  transform: scale(2.3);
}

#result {
  margin-top: var(--result-margin-top);
  background: #f9f9ff;
  border: 1px solid #d0d0d0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  border-radius: 15px;
  font-size: var(--result-font-size);
  font-weight: 700;
  color: #222;
  line-height: 2;
}
</style>
</head>

<body class="min-h-screen flex flex-col items-center justify-start p-2 sm:p-4 gap-2">

<div class="w-full text-center mt-2">
  <h1 class="text-[#5D0096] text-xl sm:text-2xl font-bold">
    <a href="https://gulf.lilly.com/mealabels/ar/mounjaro-kwikpen" target="_blank" class="text-[#5D0096]">
      Mounjaro KwikPen (0.6mL)
    </a>
  </h1>
</div>

<div class="w-full max-w-4xl flex justify-center mt-1">
  <img id="pen-image" src="https://www.mediafire.com/convkey/0be4/34416zv2fa0gtoo9g.jpg" alt="Mounjaro Pen" class="pen-image-Middle">
</div>

<div class="w-full max-w-4xl text-center mt-1">
  <a href="https://files.mealabels.gulf.lilly.com/content/mounjaro-kwikpen/kuwait/arabic_instructions_for_use.pdf" target="_blank"
     class="text-xs sm:text-sm underline text-blue-700 font-extrabold">
      KwikPen طريقة استخدام قلم
  </a>
</div>

<div class="w-full max-w-4xl p-3 sm:p-4 text-center">
  <h2 class="text-base sm:text-lg font-semibold">💉 حدد جرعة القلم الأساسي</h2>
  <div class="flex flex-wrap justify-center items-center gap-10 sm:gap-12 mt-2" id="dose-group-1">
    <img src="https://www.mediafire.com/convkey/b0a1/1v91nezacgvctmx9g.jpg" class="dose-img" data-mg="2.5">
    <img src="https://www.mediafire.com/convkey/a47f/958mgbch2zd22b39g.jpg" class="dose-img" data-mg="5">
    <img src="https://www.mediafire.com/convkey/0a59/c2b2pl0ce013zg29g.jpg" class="dose-img" data-mg="7.5">
    <img src="https://www.mediafire.com/convkey/cd8e/osqmq64a50uz9qh9g.jpg" class="dose-img" data-mg="10">
    <img src="https://www.mediafire.com/convkey/8559/v8uy1ty789xfnhu9g.jpg" class="dose-img" data-mg="12.5">
    <img src="https://www.mediafire.com/convkey/316c/de0rhp4jaxq4dr39g.jpg" class="dose-img" data-mg="15">
  </div>
</div>

<div class="w-full max-w-4xl p-3 sm:p-4 text-center">
  <h2 class="text-base sm:text-lg font-semibold">🎯 حدد الجرعة المطلوبة</h2>
  <div class="flex flex-wrap justify-center items-center gap-10 sm:gap-12 mt-2" id="dose-group-2">
    <img src="https://www.mediafire.com/convkey/b0a1/1v91nezacgvctmx9g.jpg" class="dose-img" data-mg="2.5">
    <img src="https://www.mediafire.com/convkey/a47f/958mgbch2zd22b39g.jpg" class="dose-img" data-mg="5">
    <img src="https://www.mediafire.com/convkey/0a59/c2b2pl0ce013zg29g.jpg" class="dose-img" data-mg="7.5">
    <img src="https://www.mediafire.com/convkey/cd8e/osqmq64a50uz9qh9g.jpg" class="dose-img" data-mg="10">
    <img src="https://www.mediafire.com/convkey/8559/v8uy1ty789xfnhu9g.jpg" class="dose-img" data-mg="12.5">
    <img src="https://www.mediafire.com/convkey/316c/de0rhp4jaxq4dr39g.jpg" class="dose-img" data-mg="15">
  </div>
</div>

<div id="golden-dose-container" class="flex items-center gap-2 cursor-pointer mt-1">
  <input type="checkbox" id="golden-dose" class="w-5 h-5" checked>
  <label for="golden-dose" class="font-semibold text-yellow-600 text-sm sm:text-base">
    استخدم الجرعة الذهبية
  </label>
</div>

<div id="result" class="w-full max-w-4xl p-3 text-center font-bold"></div>

<script>
const golden = document.getElementById("golden-dose");
const result = document.getElementById("result");
const image = document.getElementById("pen-image");

const doseImages = {
  "2.5": "https://www.mediafire.com/convkey/e9a4/4554jnrfc48qgoj9g.jpg",
  "5": "https://www.mediafire.com/convkey/5d4f/aaoucs7i3m4j1bc9g.jpg",
  "7.5": "https://www.mediafire.com/convkey/7522/v1sztx46b4j7wqj9g.jpg",
  "10": "https://www.mediafire.com/convkey/c10f/3d3od054v0ziacb9g.jpg",
  "12.5": "https://www.mediafire.com/convkey/e2a6/w1j1ro4qikm5c819g.jpg",
  "15": "https://www.mediafire.com/convkey/a92d/iy7hjap6omd241o9g.jpg"
};

let dose1 = null;
let dose2 = null;

function formatTicksFromML(ml){
  return Math.round((Number(ml) || 0) * 100);
}

function formatNumber(n){
  const num = Number(n) || 0;
  return Number.isInteger(num) ? num.toString() : parseFloat(num.toFixed(1)).toString();
}

function toMonthsDays(totalDays){
  const d = Math.max(0, Math.round(Number(totalDays) || 0));
  const months = Math.floor(d / 30);
  const days = d % 30;
  return `${months} شهر و ${days} يوم`;
}

function calculateResult(){
  if(dose1 && dose2){
    const baseDoseML = 0.6;
    const normalPenML = baseDoseML * 4;
    const totalPenML = golden.checked ? normalPenML + 0.6 : normalPenML;

    const doseML = (dose2 / dose1) * baseDoseML;
    const units = formatTicksFromML(doseML);
    const dosesCount = totalPenML / doseML;

    const durationDays = Math.round(dosesCount * 7);
    const durationText = toMonthsDays(durationDays);

    result.innerHTML =
      `️<div style="display:flex;align-items:center;justify-content:center;gap:6px;direction:rtl;">
          <span>النتيجة:</span>
          <u style="color:red">${units}</u>
          <span>تكة أو يونيت</span>
          <span>✅</span>
        </div>

        <div style="display:flex;align-items:center;justify-content:center;gap:6px;direction:rtl;">
          <span>عدد الجرعات:</span>
          <u style="color:green">${formatNumber(dosesCount)}</u>
          <span>💉</span>
        </div>

        <div style="display:flex;align-items:center;justify-content:center;gap:6px;direction:rtl;">
          <span>المدة:</span>
          <u style="color:#5D0096">${durationText}</u>
          <span>📅</span>
        </div>`;
  } else {
    result.innerHTML = "";
  }
}

function setup(groupId, isBase){
  document.getElementById(groupId).querySelectorAll('.dose-img').forEach(img=>{
    img.addEventListener('click',()=>{
      document.getElementById(groupId).querySelectorAll('.dose-img').forEach(x=>x.classList.remove('active'));
      img.classList.add('active');

      const mg = parseFloat(img.dataset.mg);

      if(isBase){
        dose1 = mg;
        if(doseImages[mg]) image.src = doseImages[mg];
      } else {
        dose2 = mg;
      }

      calculateResult();
    });
  });
}

golden.addEventListener('change', calculateResult);

setup("dose-group-1", true);
setup("dose-group-2", false);
</script>

</body>
</html>
