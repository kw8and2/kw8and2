<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Dose</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Cairo',sans-serif;background:#fff;}

.pen-thumb{
  width:95px;
  height:auto;
  object-fit:contain;
}

.btn{
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #ddd;
  border-radius:16px;
  font-weight:800;
  font-size:16px;
  transition:.2s;
  background:#fff;
}

.btn.active{transform:scale(1.06);}

.btn.dose-2_5.active{background:#eeeeef;border-color:#54565a;color:#54565a;}
.btn.dose-5.active{background:#eeeaf3;border-color:#3d2b57;color:#3d2b57;}
.btn.dose-7_5.active{background:#e4f5f2;border-color:#007f6f;color:#007f6f;}
.btn.dose-10.active{background:#fde8f4;border-color:#cb007b;color:#cb007b;}
.btn.dose-12_5.active{background:#e6f2fb;border-color:#0075cf;color:#0075cf;}
.btn.dose-15.active{background:#fdecea;border-color:#fa4238;color:#fa4238;}

#pen-note{
  font-size:13px;
  font-weight:800;
  padding:6px 12px;
  border-radius:12px;
  margin-top:4px;
  display:inline-block;
  color:#fff;
}

#pen-info{
  margin-top:2px;
  padding:6px 12px;
  border-radius:10px;
  font-weight:800;
  font-size:14px;
  color:#fff;
  direction:ltr;
  white-space:nowrap;
  display:inline-block;
}

#result{
  margin-top:12px;
  background:#f9f9ff;
  border:1px solid #ddd;
  border-radius:15px;
  font-size:18px;
  font-weight:700;
  padding:14px;
  direction:rtl;
  text-align:right;
  line-height:2.2;
}
</style>
</head>

<body class="p-4 flex flex-col items-center gap-3">

<h1 class="text-3xl font-extrabold text-[#5D0096]">Half Dose</h1>

<!-- صور الأقلام الثلاثة -->
<div class="flex justify-center items-end gap-4 mt-2">
  <div class="text-center">
    <img src="https://www.mediafire.com/convkey/5d4f/aaoucs7i3m4j1bc9g.jpg" class="pen-thumb">
    <div class="text-xs font-bold text-[#3d2b57] mt-1">5 mg</div>
  </div>

  <div class="text-center">
    <img src="https://www.mediafire.com/convkey/c10f/3d3od054v0ziacb9g.jpg" class="pen-thumb">
    <div class="text-xs font-bold text-[#cb007b] mt-1">10 mg</div>
  </div>

  <div class="text-center">
    <img src="https://www.mediafire.com/convkey/a92d/iy7hjap6omd241o9g.jpg" class="pen-thumb">
    <div class="text-xs font-bold text-[#fa4238] mt-1">15 mg</div>
  </div>
</div>

<div id="pen-note"></div>
<div id="pen-info">20 mg/2.4 ( 8.33 mg/mL )</div>

<div class="text-center mt-2">
  <h2 class="font-bold mb-2">🎯 اختر الجرعة المطلوبة</h2>

  <div class="flex flex-wrap gap-2 justify-center">
    <button class="btn dose-2_5 active" data-dose="2.5">2.5</button>
    <button class="btn dose-5" data-dose="5">5</button>
    <button class="btn dose-7_5" data-dose="7.5">7.5</button>
    <button class="btn dose-10" data-dose="10">10</button>
    <button class="btn dose-12_5" data-dose="12.5">12.5</button>
    <button class="btn dose-15" data-dose="15">15</button>
  </div>
</div>

<div id="result"></div>

<script>
let dose = 2.5;

function getAutoPen(d){
  if(d === 2.5) return 5;
  if(d === 5) return 10;
  return 15;
}

const penInfo = {
  5: "20 mg/2.4 ( 8.33 mg/mL )",
  10: "40 mg/2.4 ( 16.7 mg/mL )",
  15: "60 mg/2.4 ( 25 mg/mL )"
};

const penColors = {
  5: "#3d2b57",
  10: "#cb007b",
  15: "#fa4238"
};

const doseColors = {
  2.5: "#54565a",
  5: "#3d2b57",
  7.5: "#007f6f",
  10: "#cb007b",
  12.5: "#0075cf",
  15: "#fa4238"
};

function calc(){
  const pen = getAutoPen(dose);
  const ml = (dose / pen) * 0.6;
  const clicks = Math.round(ml * 100);
  const dosesCount = Math.floor(300 / clicks);

  const note = document.getElementById("pen-note");
  note.innerHTML = `جرعتك <span dir="ltr">${dose} mg</span> وقلمك <span dir="ltr">${pen} mg</span>`;
  note.style.background = penColors[pen];

  const info = document.getElementById("pen-info");
  info.textContent = penInfo[pen];
  info.style.background = penColors[pen];

  const color = doseColors[dose];

  document.getElementById("result").innerHTML =
    `💉 جرعتك: <span dir="ltr" style="color:${color};font-weight:800">${dose} mg</span><br>
     💉 قلمك: <span dir="ltr" style="color:${penColors[pen]};font-weight:800">${pen} mg</span><br>
     🔢 التكات: <span dir="ltr" style="border-bottom:2px solid ${color};padding-bottom:1px">${clicks}</span><br>
     📦 عدد الجرعات: <span dir="ltr" style="color:${color};font-weight:800">${dosesCount}</span>`;
}

document.querySelectorAll("[data-dose]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    dose = Number(btn.dataset.dose);
    calc();
  };
});

calc();
</script>

</body>
</html>
